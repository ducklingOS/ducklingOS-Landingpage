<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to DucklingOS - A modern, open-source operating system designed for everyone">
    <meta name="keywords" content="DucklingOS, operating system, Linux, open source, free OS, modern OS">
    <meta name="author" content="DucklingOS Team">
    
    <title>Welcome to DucklingOS</title>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="Duckling1.jpg.jpeg">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Open Graph / Social Meta Tags -->
    <meta property="og:title" content="DucklingOS - A Modern Operating System">
    <meta property="og:description" content="Easy, Elegant, Professional, Fast - DucklingOS for everyone">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ducklingos.com">
    <meta property="og:image" content="Duckling1.jpg.jpeg">
</head>
<body>
    <!-- Welcome/Splash Page -->
    <div class="welcome-page">
        <!-- Background Effects -->
        <div class="welcome-bg"></div>
        <div class="welcome-particles"></div>
        
        <!-- Welcome Content -->
        <div class="welcome-content fade-in-up delay-1">
            <!-- Logo -->
            <img src="Duckling1.jpg.jpeg" alt="DucklingOS Logo" class="welcome-logo">
            
            <!-- Title -->
            <h1 class="welcome-title">Welcome to DucklingOS</h1>
            
            <!-- Subtitle -->
            <p class="welcome-subtitle text-center">
                Experience a modern, open-source operating system designed for everyone. 
                Easy to use, powerful, and beautifully crafted.
            </p>
            
            <!-- Buttons -->
            <div class="welcome-buttons">
                <a href="home.html" class="btn btn-primary btn-download welcome-enter">
                    Enter Website
                </a>
                <a href="https://github.com/DucklingOS" target="_blank" class="btn btn-github">
                    <span>&#9733;</span> View on GitHub
                </a>
            </div>
        </div>
        
        <!-- Loading Spinner (Optional) -->
        <div class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/main.js"></script>
    
    <!-- Auto-redirect to home after 5 seconds (optional) -->
    <script>
        // Uncomment below to enable auto-redirect
        // setTimeout(function() {
        //     window.location.href = 'home.html';
        // }, 5000);
    </script>
</body>
</html>
